name: Check external IP lists

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Download and compare lists
        id: compare
        run: |
          CHANGED=false

          for NAME in roblox telegram; do
            URL="https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Subnets/IPv4/${NAME}.lst"
            curl -fsSL -o "/tmp/${NAME}.lst" "$URL"

            DEST="custom/${NAME}.lst"

            if [ ! -f "$DEST" ] || ! diff -q "/tmp/${NAME}.lst" "$DEST" > /dev/null 2>&1; then
              echo "Changed: $NAME"
              cp "/tmp/${NAME}.lst" "$DEST"
              CHANGED=true
            fi
          done

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom/roblox.lst custom/telegram.lst
          git commit -m "chore: update external IP lists"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
